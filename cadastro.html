<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>FETELECOM</title>

     <!--Bootstrap CSS-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--Css personalizado-->
    <link rel="stylesheet" href="css/cadastro.css">

    <!--Icone na aba do navegador-->
    <link rel="shortcut icon" href="images/icons/icon-page.png" type="image/x-icon">
</head>
<body>
    <div class="container">

    <div class="right">
      <h1>Cadastre-se</h1>

      <form>
        <label>Nome</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Senha</label>
        <input type="password" class="senha" required>

        <label>Confirmar Senha</label>
        <input type="password" class="senha" required>
            <small id="erroSenha"></small>
        <div class="mostrar">
          <input type="checkbox" id="toggleSenha">
          <label for="toggleSenha">Mostrar senha</label>
        </div>

        <button type="button" onclick="window.location.href='telefone.html'">
        CRIAR CONTA
        </button>
      </form>

      <p class="cad">
        Já possui uma conta? <a href="login.html">Entre</a>
      </p>
    </div>

    <div class="left">
      <a class="logo" href="#">
      <img src="#" alt="#" width="400" height="80" class="me-2">
      </a>
      <h1>Bem vindo!</h1>
      <p>Crie uma conta no nosso sistema para realizar suas solicitações conosco!</p>
    </div>

  </div>

  <script>
    const toggle = document.getElementById("toggleSenha");
    const senhas = document.querySelectorAll(".senha");

    toggle.addEventListener("change", () => {
      senhas.forEach(input => {
        input.type = toggle.checked ? "text" : "password";
      });
    });
  </script>

  <script>
        const senha = document.querySelectorAll(".senha")[0];
        const confirmar = document.querySelectorAll(".senha")[1];
        const erro = document.getElementById("erroSenha");

        function validarSenha() {
        const s = senha.value;
        const c = confirmar.value;

        const regex = /^(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

        if (s.length === 0 && c.length === 0) {
            erro.innerText = "";
            return;
        }

        if (!regex.test(s)) {
            erro.innerText = "Mín. 8 caracteres, número e caracter especial.";
            return;
        }

        if (c && s !== c) {
            erro.innerText = "As senhas não coincidem.";
            return;
        }

        erro.innerText = "";
        }

        senha.addEventListener("input", validarSenha);
        confirmar.addEventListener("input", validarSenha);
</script>

</body>
</html>
