<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FETELECOM - Solicitações</title>

  <link rel="stylesheet" href="css/areaCliente.css">
</head>
<body>
  <header>
    <h1>Solicitações</h1>
    <button class="btn-nova">NOVA SOLICITAÇÃO</button>
  </header>

  <div class="stats">
    <div class="stat-box">Ativas<br><strong>0</strong></div>
    <div class="stat-box">Concluídas<br><strong>10</strong></div>
    <div class="stat-box">Canceladas<br><strong>3</strong></div>
    <div class="stat-box">Total<br><strong>13</strong></div>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="Buscar...">
    <button>🔍</button>
    <button>⚙️</button>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-info">
        <div><strong>ID:</strong> 45</div>
        <div><strong>Endereço:</strong> Rua Exemplo, 123</div>
        <div><strong>Data:</strong> 01/03/2026</div>
      </div>
      <button class="edit-btn">✏️</button>
    </div>
    <div class="card">
      <div class="card-info">
        <div><strong>ID:</strong> 46</div>
        <div><strong>Endereço:</strong> Av. Central, 456</div>
        <div><strong>Data:</strong> 05/03/2026</div>
      </div>
      <button class="edit-btn">✏️</button>
    </div>
    <div class="card">
      <div class="card-info">
        <div><strong>ID:</strong> 47</div>
        <div><strong>Endereço:</strong> Praça das Flores, 789</div>
        <div><strong>Data:</strong> 10/03/2026</div>
      </div>
      <button class="edit-btn">✏️</button>
    </div>
  </div>

<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <h2>Nova Solicitação</h2>

    <form>
      <label>Tipo de serviço</label>
      <select required>
        <option value="">Selecione</option>
        <option>Instalação</option>
        <option>Manutenção</option>
        <option>Reparo</option>
      </select>

      <label>Endereço</label>
      <input type="text" placeholder="Digite o endereço que o serviço precisa ser realizado" required>

      <label>Email</label>
      <input type="email" name="" id="">

      <label>Numero de celular </label> <span>*Se prefere usar o telefone cadastrado, desconsidere.</span>
       <div class="telefone-input">
        <span class="prefixo">+55</span>
      <input type="text" class="wpp-mask" placeholder="( ) _____-____" required>
      </div>

      <div class="datas">
        <div>
          <label>Data início</label>
          <input type="date" required>
        </div>

        <div>
          <label>Data fim</label>
          <input type="date" required>
        </div>
      </div>

      <div class="acoes">
        <button type="button" class="cancelar">Cancelar</button>
        <button type="submit" class="ok">Criar</button>
      </div>
    </form>
  </div>
</div>

<script>
  const modal = document.getElementById("modal");
  const abrir = document.querySelector(".btn-nova");
  const cancelar = document.querySelector(".cancelar");

  abrir.onclick = () => modal.style.display = "flex";
  cancelar.onclick = () => modal.style.display = "none";

  modal.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") modal.style.display = "none";
  });
</script>

<script src="js/máscara.js"></script>

</body>
</html>
