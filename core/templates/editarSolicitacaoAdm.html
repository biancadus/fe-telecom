{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Solicitação</title>

    <!--Bootstrap-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="{% static 'css/areaCliente.css' %}">

    <link rel="shortcut icon" href="{% static 'images/icons/icon-page.png' %}">
</head>

<body class="editar-body">

<div class="editar-container">

    <div class="editar-box">

        <div class="editar-topo">

            <div>

                <h2>
                    Editar Solicitação
                </h2>

                <span>
                    Solicitação #{{ s.id }}
                </span>

            </div>

            <a
                href="{% url 'solicitacoes_adm' %}"
                class="voltar-btn"
            >
                <i class="fa-solid fa-arrow-left"></i>
            </a>

        </div>

        <form method="POST">

            {% csrf_token %}

            <label>
                Tipo de serviço
            </label>

            <select
                name="tipo_servico"
                required
            >

                <option
                    value="Instalação"
                    {% if s.tipo_servico == 'Instalação' %}
                    selected
                    {% endif %}
                >
                    Instalação
                </option>

                <option
                    value="Manutenção"
                    {% if s.tipo_servico == 'Manutenção' %}
                    selected
                    {% endif %}
                >
                    Manutenção
                </option>

                <option
                    value="Reparo"
                    {% if s.tipo_servico == 'Reparo' %}
                    selected
                    {% endif %}
                >
                    Reparo
                </option>

            </select>

            <label>
                Endereço
            </label>

            <input
                type="text"
                name="endereco"
                value="{{ endereco.rua }}"
                required
            >

            <label>Bairro</label>
            <input
                type="text"
                name="bairro"
                value="{{ endereco.bairro }}"
                required
            >

            <label>Número</label>
            <input
                type="text"
                name="numero"
                value="{{ endereco.numero }}"
                required
            >

            <label>Cidade</label>
            <input
                type="text"
                name="cidade"
                value="{{ endereco.cidade }}"
                required
            >

            <div class="datas">

                <div>

                    <label>
                        Data disponível
                    </label>

                    <input
                        type="date"
                        name="data"
                        value="{{ s.data_disponivel|date:'Y-m-d' }}"
                        required
                    >

                </div>

                <div>

                    <label>
                        Horário disponível
                    </label>

                    <select
                        name="horario"
                        required
                    >

                        <option
                            value="08:00"
                            {% if s.horario_disponivel|time:'H:i' == '08:00' %}
                            selected
                            {% endif %}
                        >
                            08:00
                        </option>

                        <option
                            value="10:00"
                            {% if s.horario_disponivel|time:'H:i' == '10:00' %}
                            selected
                            {% endif %}
                        >
                            10:00
                        </option>

                        <option
                            value="12:00"
                            {% if s.horario_disponivel|time:'H:i' == '12:00' %}
                            selected
                            {% endif %}
                        >
                            12:00
                        </option>

                        <option
                            value="14:00"
                            {% if s.horario_disponivel|time:'H:i' == '14:00' %}
                            selected
                            {% endif %}
                        >
                            14:00
                        </option>

                        <option
                            value="16:00"
                            {% if s.horario_disponivel|time:'H:i' == '16:00' %}
                            selected
                            {% endif %}
                        >
                            16:00
                        </option>

                    </select>

                </div>

                <div>

                    <label>
                        Porte do local
                    </label>

                    <select
                        name="porte_local"
                        required
                    >

                        <option
                            value="Pequena"
                            {% if s.porte_local == 'Pequena' %}
                            selected
                            {% endif %}
                        >
                            Pequena
                        </option>

                        <option
                            value="Média"
                            {% if s.porte_local == 'Média' %}
                            selected
                            {% endif %}
                        >
                            Média
                        </option>

                        <option
                            value="Grande"
                            {% if s.porte_local == 'Grande' %}
                            selected
                            {% endif %}
                        >
                            Grande
                        </option>

                    </select>

                </div>

            </div>

            <label>
                Observações
            </label>

            <textarea
                name="detalhes"
                rows="5"
            >{{ s.detalhes }}</textarea>

            <div class="acoes">

                <a
                    href="{% url 'solicitacoes_adm' %}"
                    class="cancelar-link"
                >
                    Cancelar
                </a>

                <button
                    type="submit"
                    class="ok"
                >
                    Salvar alterações
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
