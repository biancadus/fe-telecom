<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FETELECOM</title>

     <!--Bootstrap CSS-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--Css personalizado-->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/recuperarSenha.css' %}">

    <!--Icone na aba do navegador-->
    <link rel="shortcut icon" href="{% static 'images/icons/icon-page.png' %}">
</head>
<body>
    <div class="wrapper">
    <div class="box">
      <h2>Redefinir senha</h2>
      <p class="desc">Digite seu Email para receber o código de validação.</p>

      <form id="formSenha" method="POST">
        {% csrf_token %}

        <div class="campo">
        <label>Email</label>
        <input type="email" name="email" required>
    </div>
    <button type="submit">
        ENVIAR CÓDIGO
    </button>

    {% if erro %}
    <div class="alert alert-danger">
        {{ erro }}
    </div>
    {% endif %}
      </form>

      <a href="{% url 'login' %}" class="voltar">Voltar ao login</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

    const toggle = document.getElementById("toggleSenha");
    const senhas = document.querySelectorAll(".senha");
    const novaSenha = document.getElementById("novaSenha");
    const confirmar = document.getElementById("confirmarSenha");
    const erro = document.getElementById("erro");

    toggle.addEventListener("change", () => {

        senhas.forEach(input => {
            input.type = toggle.checked ? "text" : "password";
        });

    });

    function validar() {

        const senha = novaSenha.value;
        const confirm = confirmar.value;

        const regex = /^(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

        if (senha.length === 0 && confirm.length === 0) {
            erro.innerText = "";
            return;
        }

        if (!regex.test(senha)) {
            erro.innerText =
                "Mín. 8 caracteres, número e caractere especial.";
            return;
        }

        if (confirm && senha !== confirm) {
            erro.innerText = "As senhas não coincidem.";
            return;
        }

        erro.innerText = "";
    }

    novaSenha.addEventListener("input", validar);
    confirmar.addEventListener("input", validar);

    document
        .getElementById("formSenha")
        .addEventListener("submit", (e) => {

            validar();

            if (erro.innerText !== "") {
                e.preventDefault();
            }

        });

});
</script>

<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

</body>
</html>
