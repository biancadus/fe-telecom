<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>FETELECOM</title>

     <!--Bootstrap CSS-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--Css personalizado-->
    <link rel="stylesheet" href="css/cadastro.css">

    <!--Icone na aba do navegador-->
    <link rel="shortcut icon" href="images/icons/icon-page.png" type="image/x-icon">
</head>
<body>
    <div class="container">

    {% load static %}
<div class="right">
    <h1>Cadastre-se</h1>

    <form method="POST" action="{% url 'cadastro' %}">
    {% csrf_token %} <div class="form-group">
        <label>Nome de Usuário</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password1" id="senha" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Confirmar Senha</label>
        <input type="password" name="password2" id="confirmarSenha" class="form-control" required>
    </div>

    <small id="erroSenha" style="color: red;"></small>

    <button type="submit" class="btn btn-primary mt-3">CRIAR CONTA</button>
</form>

    <p class="cad">
        Já possui uma conta? <a href="{% url 'login' %}">Entre</a>
    </p>
</div>
  

  <script>
        const senha = document.querySelectorAll(".senha")[0];
        const confirmar = document.querySelectorAll(".senha")[1];
        const erro = document.getElementById("erroSenha");

        function validarSenha() {
        const s = senha.value;
        const c = confirmar.value;

        const regex = /^(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

        if (s.length === 0 && c.length === 0) {
            erro.innerText = "";
            return;
        }

        if (!regex.test(s)) {
            erro.innerText = "Mín. 8 caracteres, número e caracter especial.";
            return;
        }

        if (c && s !== c) {
            erro.innerText = "As senhas não coincidem.";
            return;
        }

        erro.innerText = "";
        }

        senha.addEventListener("input", validarSenha);
        confirmar.addEventListener("input", validarSenha);
</script>

<script src="js/ocultarSenha.js"></script>

</body>
</html>
