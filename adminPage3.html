<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrador</title>
    <link rel="stylesheet" href="css/adminPage3.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <h2 class="logo">ADMINISTRADOR</h2>
            <nav>
                <ul>
                    <li><a href="#" class="active">Início</a></li>
                    <li><a href="#">Clientes</a></li>
                    <li><a href="#">Solicitações</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
    <header class="header">
        <h1>Solicitações</h1>
        </header>

    <div class="search-bar">
        <select class="search-select">
            <option>Buscar por</option>
        </select>
        <input type="text" placeholder="ID, Cliente, Status, Endereço..." class="search-input">
        <button class="search-btn">PESQUISAR</button>
    </div>

    <div class="date-filters">
    <div class="date-group">
        <label>Data inicio</label>
        <input type="text" placeholder="11/09/2007">
    </div>
    <div class="date-group">
        <label>Data Fim</label>
        <input type="text" placeholder="11/09/2008">
    </div>
</div>

    <table class="client-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>CLIENTE</th>
                <th>DATA INICIO</th>
                <th>DATA FIM</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>
    </main>
    </div>

</body>
</html>
